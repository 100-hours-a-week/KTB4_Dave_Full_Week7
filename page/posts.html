<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>게시글 목록 | 아무 말 대잔치</title>

  <link rel="stylesheet" href="/css/common.css" />
  <link rel="stylesheet" href="/css/header.css" />
  <link rel="stylesheet" href="/css/posts.css" />
</head>
<body>
  <app-header></app-header>

  <main class="posts-page">
    <section class="posts-hero" aria-labelledby="postsTitle">
      <p class="posts-hero__greeting">안녕하세요,</p>
      <h2 id="postsTitle" class="posts-hero__title">
        아무 말 대잔치 <strong>게시판</strong> 입니다.
      </h2>
    </section>

    <section class="posts-section" aria-label="게시글 목록">
      <div class="posts-section__toolbar">
        <button id="writePostButton" class="posts-section__write-button" type="button">
          게시글 작성
        </button>
      </div>

      <div id="postList" class="post-list">
      </div>

      <p id="emptyPostMessage" class="post-list__empty" hidden>
        등록된 게시글이 없습니다.
      </p>

      <div id="postLoading" class="post-list__loading" aria-live="polite" hidden>
        게시글을 불러오는 중입니다.
      </div>
      <div id="postObserverTarget" class="post-list__observer" aria-hidden="true"></div>
    </section>
  </main>

  <script type="module" src="/js/posts.js"></script>
  <script type="module" src="/js/AppHeader.js"></script>
</body>
</html>
