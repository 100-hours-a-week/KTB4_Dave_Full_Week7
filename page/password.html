<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>비밀번호 수정 | 아무 말 대잔치</title>

  <link rel="stylesheet" href="/css/common.css" />
  <link rel="stylesheet" href="/css/header.css" />
  <link rel="stylesheet" href="/css/password.css" />
</head>
<body>
  <app-header></app-header>

  <main class="password-page">
    <form id="passwordForm" class="password-form" novalidate>
      <h2 class="password-form__title">비밀번호 수정</h2>

      <section class="password-form__panel" aria-label="비밀번호 변경 입력 영역">
        <div class="password-form__field">
          <label class="password-form__label" for="currentPassword">
            기존 비밀번호
          </label>
          <input
            id="currentPassword"
            class="password-form__input"
            type="password"
            placeholder="기존 비밀번호를 입력하세요"
            autocomplete="current-password"
            aria-describedby="currentPasswordHelper"
          />
          <p
            id="currentPasswordHelper"
            class="password-form__helper"
            aria-live="polite"
          ></p>
        </div>

        <div class="password-form__field">
          <label class="password-form__label" for="newPassword">
            변경 비밀번호
          </label>
          <input
            id="newPassword"
            class="password-form__input"
            type="password"
            placeholder="변경할 비밀번호를 입력하세요"
            autocomplete="new-password"
            aria-describedby="newPasswordHelper"
          />
          <p
            id="newPasswordHelper"
            class="password-form__helper"
            aria-live="polite"
          ></p>
        </div>

        <div class="password-form__field">
          <label class="password-form__label" for="newPasswordConfirm">
            변경 비밀번호 확인
          </label>
          <input
            id="newPasswordConfirm"
            class="password-form__input"
            type="password"
            placeholder="변경할 비밀번호를 한번 더 입력하세요"
            autocomplete="new-password"
            aria-describedby="newPasswordConfirmHelper"
          />
          <p
            id="newPasswordConfirmHelper"
            class="password-form__helper"
            aria-live="polite"
          ></p>
        </div>
      </section>

      <button
        id="passwordSubmitButton"
        class="password-form__submit"
        type="submit"
        disabled
      >
        수정하기
      </button>
    </form>
  </main>

  <div
    id="passwordToast"
    class="password-toast"
    role="status"
    aria-live="polite"
    hidden
  >
    수정완료
  </div>

  <script type="module" src="/js/password.js"></script>
  <script type="module" src="/js/AppHeader.js"></script>
</body>
</html>
